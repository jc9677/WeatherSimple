<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍁eatherSimple</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="brand">
        <div class="logo logo-img-wrapper">
          <img src="assets/E6157E82-3078-4B5F-B897-090BD4D07917-Small.jpeg" alt="🍁eatherSimple logo" />
        </div>
        <h1 class="brand-name">eatherSimple</h1>
        <p class="brand-tagline">Canadian weather forecast data from api.weather.gc.ca. That is all.</p>
      </div>
      <button id="themeToggleButton" type="button" class="theme-toggle-button" aria-label="Toggle dark mode">🌙</button>
      <button id="searchCityButton" type="button" class="search-icon-button" aria-label="Search city">🔍</button>
      <input id="cityInput" name="city" type="hidden" />
    </header>

    <main>
      <div id="statusMessage" class="status-message" aria-live="polite"></div>

      <section class="card info-card">
        <h2 id="forecastTitle">Forecast details</h2>
        <div id="forecastContainer" class="forecast-container"></div>
      </section>

    </main>

    <footer>
      <p>Powered by <a href="https://api.weather.gc.ca/" target="_blank" rel="noopener">api.weather.gc.ca</a>.</p>
    </footer>
  </div>

  <div id="cityModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="cityModalTitle">
    <div class="modal-content" role="document">
      <button id="closeModal" class="modal-close" aria-label="Close city search">×</button>
      <h2 id="cityModalTitle">Search for a city</h2>
      <p class="hint">Type the first letter of the city name to begin searching.</p>
      <div class="modal-search-row">
        <input id="citySearchInput" type="search" placeholder="Start typing a city name" autocomplete="off" />
      </div>
      <div id="citySearchStatus" class="search-status" aria-live="polite"></div>
      <div id="searchResults" class="search-results" role="listbox"></div>
    </div>
  </div>

  <div class="status-bar" aria-live="polite">
    <span><strong>Forecast updated:</strong> <span id="forecastUpdated">—</span></span>
    <span><strong>Last request:</strong> <span id="requestTime">—</span></span>
  </div>

  <button id="refreshButton" type="button" class="refresh-button" aria-label="Refresh forecast">🔄</button>

  <script src="script.js"></script>
</body>
</html>
